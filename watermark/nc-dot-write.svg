<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <title>nc logo light sweep watermark</title>
  <desc>transparent animated nc studios watermark using the real logo with champagne light sweep and gold signature glow.</desc>
  <defs>
    <mask id="logo-reveal">
      <rect x="150" y="70" width="0" height="580" rx="8" fill="#fff">
        <animate attributeName="width" from="0" to="980" dur="1.65s" begin=".18s" fill="freeze"/>
      </rect>
    </mask>
    <linearGradient id="sweep-gradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#d8b76e" stop-opacity="0"/>
      <stop offset="42%" stop-color="#f0dca8" stop-opacity=".18"/>
      <stop offset="50%" stop-color="#fff7ef" stop-opacity=".9"/>
      <stop offset="58%" stop-color="#f0dca8" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#d8b76e" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="gold-bloom" cx="50%" cy="46%" r="50%">
      <stop offset="0%" stop-color="#fff8de" stop-opacity=".28"/>
      <stop offset="42%" stop-color="#d8b76e" stop-opacity=".14"/>
      <stop offset="100%" stop-color="#8f6f2f" stop-opacity="0"/>
    </radialGradient>
    <filter id="gold-glow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.85 0 0.72 0 0 0.37 0 0 0.42 0 0.1 0 0 0 0.82 0" result="gold"/>
      <feMerge>
        <feMergeNode in="gold"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="signature-glow" x="-22%" y="-45%" width="144%" height="190%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.85 0 0.72 0 0 0.37 0 0 0.42 0 0.10 0 0 0 .72 0" result="signature"/>
      <feMerge>
        <feMergeNode in="signature"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    svg{background:transparent}
    .logo-wrap{
      opacity:0;
      animation:logo-in .35s ease .18s forwards, logo-hold 4.2s ease 1.75s forwards;
    }
    .logo-base{
      opacity:.92;
      filter:url(#gold-glow);
    }
    .logo-signature{
      opacity:0;
      filter:url(#signature-glow);
      animation:gold-signature 2.2s ease 1.55s forwards;
    }
    .bloom{
      opacity:0;
      animation:bloom-in 1.8s ease 1.2s forwards;
      mix-blend-mode:screen;
    }
    .sweep{
      opacity:0;
      mix-blend-mode:screen;
      filter:drop-shadow(0 0 18px rgba(240,220,168,.52));
      transform:translateX(-460px) skewX(-17deg);
      animation:sweep-across 1.8s cubic-bezier(.18,.86,.2,1) .12s forwards;
    }
    .c-definition{
      opacity:0;
      mix-blend-mode:screen;
      animation:c-definition-in .18s ease .82s forwards;
    }
    .c-trace{
      opacity:0;
      fill:none;
      stroke:#d8b76e;
      stroke-width:4.8;
      stroke-linecap:round;
      stroke-linejoin:round;
      stroke-dasharray:1;
      stroke-dashoffset:1;
      filter:drop-shadow(0 0 12px rgba(240,220,168,.68)) drop-shadow(0 0 18px rgba(163,32,36,.2));
    }
    .c-trace-top{
      animation:c-write .92s cubic-bezier(.18,.86,.2,1) .86s forwards, c-rest .9s ease 2.16s forwards;
    }
    .c-trace-lower{
      stroke-width:5.2;
      animation:c-write 1.05s cubic-bezier(.18,.86,.2,1) 1.02s forwards, c-rest .9s ease 2.24s forwards;
    }
    @keyframes logo-in{to{opacity:1}}
    @keyframes logo-hold{
      0%,100%{transform:scale(1)}
      45%{transform:scale(1.008)}
    }
    @keyframes gold-signature{
      0%{opacity:0}
      26%{opacity:.32}
      100%{opacity:.12}
    }
    @keyframes bloom-in{
      0%{opacity:0;transform:scale(.82)}
      45%{opacity:.72}
      100%{opacity:.18;transform:scale(1.05)}
    }
    @keyframes sweep-across{
      0%{opacity:0;transform:translateX(-460px) skewX(-17deg)}
      18%{opacity:.95}
      100%{opacity:0;transform:translateX(760px) skewX(-17deg)}
    }
    @keyframes c-definition-in{to{opacity:1}}
    @keyframes c-write{
      0%{opacity:0;stroke-dashoffset:1}
      12%{opacity:.95}
      100%{opacity:.95;stroke-dashoffset:0}
    }
    @keyframes c-rest{to{opacity:.28}}
  </style>
  <g class="logo-wrap" mask="url(#logo-reveal)">
    <ellipse class="bloom" cx="640" cy="300" rx="340" ry="155" fill="url(#gold-bloom)"/>
    <image class="logo-signature" href="nc-watermark-logo.png" x="190" y="104" width="900" height="450" preserveAspectRatio="xMidYMid meet"/>
    <image class="logo-base" href="nc-watermark-logo.png" x="190" y="104" width="900" height="450" preserveAspectRatio="xMidYMid meet"/>
  </g>
  <g class="c-definition" mask="url(#logo-reveal)">
    <path class="c-trace c-trace-top" pathLength="1" d="M670.8 318.5 C686.6 296.6 706.8 279.9 727 273.7 C742 272 749 279 748.1 289.5 C745.5 297.5 737.5 306.3 734.1 310.7"/>
    <path class="c-trace c-trace-lower" pathLength="1" d="M671 319 C660 343 666 365 690 372.5 C718 381 762 356 802 327.5"/>
  </g>
  <rect class="sweep" x="360" y="72" width="120" height="580" rx="60" fill="url(#sweep-gradient)"/>
</svg>
