<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 512">
  <title>nc bouncing dot watermark</title>
  <desc>transparent animated nc studios watermark where one red dot moves in the handwritten nc route.</desc>
  <defs>
    <filter id="red-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.95 0 0.08 0 0 0 0 0 0.08 0 0 0 0 0 0.9 0" result="red"/>
      <feMerge>
        <feMergeNode in="red"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <path id="nc-route" d="M348 306 C373 258 402 208 423 188 C413 232 381 281 352 306 C407 260 455 196 482 212 C514 231 450 315 516 316 C586 317 589 191 631 198 C686 207 578 319 647 319 C687 319 716 279 744 248"/>
  </defs>
  <style>
    svg{background:transparent}
    .dot{
      fill:#ff3030;
      filter:url(#red-glow);
      opacity:0;
      animation:dot-on .01s linear .12s forwards, dot-off .24s ease 2.28s forwards;
    }
    @keyframes dot-on{to{opacity:1}}
    @keyframes dot-off{to{opacity:0}}
  </style>
  <circle class="dot" r="12">
    <animate attributeName="r" values="10;16;11;14;12" dur="2.1s" begin=".12s" fill="freeze"/>
    <animateMotion dur="2.1s" begin=".12s" fill="freeze">
      <mpath href="#nc-route"/>
    </animateMotion>
  </circle>
</svg>
