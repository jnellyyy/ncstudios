<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NC Studios</title>

<link rel="manifest" href="site.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-32.png">
<meta name="theme-color" content="#0f1115">

<style>
:root{
  --bg1:#0f1115;
  --bg2:#171a20;
  --panel:rgba(255,255,255,0.07);
  --panel2:rgba(255,255,255,0.10);
  --line:rgba(255,255,255,0.12);
  --text:#f5f7fb;
  --muted:#a7afbe;
  --accent:#b91c1c;
  --accent2:#ef4444;
  --shadow:0 20px 50px rgba(0,0,0,0.35);
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
  background:
    radial-gradient(circle at top left, rgba(185,28,28,0.30), transparent 34%),
    linear-gradient(145deg,var(--bg1),var(--bg2));
  color:var(--text);
  display:grid;
  place-items:center;
  padding:18px;
}

.shell{
  width:min(520px,100%);
}

.logo{
  width:82px;
  height:82px;
  border-radius:26px;
  display:grid;
  place-items:center;
  background:linear-gradient(145deg,#1f2937,#111827);
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  font-size:24px;
  font-weight:900;
  letter-spacing:-1px;
  margin:0 auto 18px;
}

.card{
  background:linear-gradient(145deg,rgba(255,255,255,0.11),rgba(255,255,255,0.05));
  border:1px solid var(--line);
  border-radius:34px;
  padding:26px;
  box-shadow:var(--shadow);
  text-align:center;
}

.kicker{
  color:var(--muted);
  font-size:12px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:0.12em;
}

h1{
  margin:10px 0 10px;
  font-size:44px;
  line-height:0.95;
  letter-spacing:-1.8px;
}

p{
  margin:0;
  color:var(--muted);
  font-size:15px;
  line-height:1.5;
}

.actions{
  display:grid;
  gap:10px;
  margin-top:24px;
}

a{
  display:block;
  text-decoration:none;
  color:var(--text);
  background:var(--accent);
  padding:15px 16px;
  border-radius:18px;
  font-weight:900;
}

a.secondary{
  background:var(--panel2);
  border:1px solid var(--line);
}

.mini{
  margin-top:16px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.stat{
  background:rgba(255,255,255,0.06);
  border:1px solid var(--line);
  border-radius:20px;
  padding:12px;
}

.stat span{
  display:block;
  color:var(--muted);
  font-size:11px;
  font-weight:800;
}

.stat strong{
  display:block;
  margin-top:6px;
  font-size:20px;
}

@media(max-width:520px){
  h1{
    font-size:38px;
  }

  .card{
    padding:22px;
  }
}
</style>
</head>

<body>
<div class="shell">
  <div class="logo">NC</div>

  <section class="card">
    <div class="kicker">Business hub</div>
    <h1>NC Studios</h1>
    <p>Manage bookings, clients, shoots, money, lists and delivery in one clean place.</p>

    <div class="mini">
      <div class="stat">
        <span>Bookings</span>
        <strong id="bookingCount">0</strong>
      </div>

      <div class="stat">
        <span>Clients</span>
        <strong id="clientCount">0</strong>
      </div>

      <div class="stat">
        <span>Projects</span>
        <strong id="deliveryCount">0</strong>
      </div>
    </div>

    <div class="actions">
      <a href="dashboard.html">Open NC Studios</a>
      <a class="secondary" href="bookings.html">Add a booking</a>
    </div>
  </section>
</div>

<script>
function getCount(key){
  try{
    const data = JSON.parse(localStorage.getItem(key)) || [];
    return Array.isArray(data) ? data.length : 0;
  }catch(error){
    return 0;
  }
}

document.getElementById("bookingCount").textContent = getCount("ncstudios_bookings_v1");
document.getElementById("clientCount").textContent = getCount("ncstudios_clients_v1");
document.getElementById("deliveryCount").textContent = getCount("ncstudios_delivery_v1");

if("serviceWorker" in navigator){
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("sw.js").catch(function(){});
  });
}
</script>
</body>
</html>
