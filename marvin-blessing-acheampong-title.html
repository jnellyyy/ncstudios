<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marvin and Blessing Acheampong Title Export</title>
<style>
@font-face{
  font-family:"NC Studio Brand";
  src:url("assets/fonts/NC_Font_.ttf") format("truetype");
  font-weight:400;
  font-style:normal;
  font-display:swap;
}

:root{
  --black:#020203;
  --panel:rgba(10,10,12,0.88);
  --gold:#d8b76e;
  --gold-soft:#f0dca8;
  --ivory:#f8f3eb;
  --muted:#aaa196;
}

*{box-sizing:border-box;}

html,
body{
  margin:0;
  min-height:100%;
  background:var(--black);
  color:var(--ivory);
  font-family:"NC Studio Brand",sans-serif;
}

body{
  display:grid;
  min-height:100svh;
  grid-template-rows:1fr auto;
  overflow:hidden;
}

.stage{
  display:grid;
  place-items:center;
  padding:18px;
  background:#050505;
}

.frame{
  width:min(1180px,100%);
  aspect-ratio:16 / 9;
  border:1px solid rgba(216,183,110,0.24);
  background-color:#111;
  background-image:
    linear-gradient(45deg,rgba(255,255,255,0.055) 25%,transparent 25%),
    linear-gradient(-45deg,rgba(255,255,255,0.055) 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,rgba(255,255,255,0.055) 75%),
    linear-gradient(-45deg,transparent 75%,rgba(255,255,255,0.055) 75%);
  background-position:0 0,0 12px,12px -12px,-12px 0;
  background-size:24px 24px;
  box-shadow:0 30px 100px rgba(0,0,0,0.76);
}

canvas{
  display:block;
  width:100%;
  height:100%;
}

.controls{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  padding:12px 16px calc(12px + env(safe-area-inset-bottom));
  background:var(--panel);
  border-top:1px solid rgba(216,183,110,0.18);
  backdrop-filter:blur(18px);
}

.status{
  min-width:0;
  color:var(--muted);
  font-size:13px;
  line-height:1.35;
}

.status strong{
  display:block;
  color:var(--ivory);
  font-size:14px;
  font-weight:650;
}

.actions{
  display:flex;
  gap:8px;
  flex:0 0 auto;
}

button{
  border:1px solid rgba(216,183,110,0.34);
  background:linear-gradient(180deg,rgba(255,248,222,0.13),rgba(216,183,110,0.08));
  color:var(--ivory);
  min-height:44px;
  padding:0 14px;
  border-radius:8px;
  font:inherit;
  font-weight:650;
  cursor:pointer;
}

button.primary{
  background:linear-gradient(180deg,rgba(240,220,168,0.92),rgba(216,183,110,0.84));
  color:#11100d;
  border-color:rgba(255,248,222,0.62);
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

@media(max-width:720px){
  body{overflow:auto;}
  .stage{padding:10px;}
  .controls{
    align-items:stretch;
    flex-direction:column;
  }
  .actions{
    width:100%;
  }
  button{
    flex:1;
  }
}
</style>
</head>
<body>
  <main class="stage">
    <div class="frame">
      <canvas id="titleCanvas" width="1920" height="1080" aria-label="Marvin and Blessing Acheampong title card preview"></canvas>
    </div>
  </main>

  <footer class="controls">
    <div class="status" id="status">
      <strong>Marvin & Blessing Acheampong</strong>
      Transparent 1920 x 1080 title card, fast 15fps Safari frame sequence.
    </div>
    <div class="actions">
      <button type="button" id="previewBtn">preview again</button>
      <button type="button" id="pngBtn">save still</button>
      <button type="button" class="primary" id="framesBtn">save Safari frames</button>
      <button type="button" id="videoBtn">save WebM video</button>
    </div>
  </footer>

<script>
(() => {
  const canvas = document.getElementById("titleCanvas");
  const ctx = canvas.getContext("2d", { alpha:true });
  const previewBtn = document.getElementById("previewBtn");
  const pngBtn = document.getElementById("pngBtn");
  const framesBtn = document.getElementById("framesBtn");
  const videoBtn = document.getElementById("videoBtn");
  const status = document.getElementById("status");
  const logo = new Image();
  const duration = 3.4;
  const vogueFont = "Didot, 'Bodoni 72', 'Bodoni 72 Smallcaps', 'Bodoni 72 Oldstyle', 'Times New Roman', Times, serif";
  let startTime = performance.now();
  let recording = false;
  let exportingFrames = false;

  logo.src = "ncstudios-logo-transparent.png";

  const clamp = (value, min = 0, max = 1) => Math.min(max, Math.max(min, value));
  const easeOut = value => 1 - Math.pow(1 - clamp(value), 3);
  const easeInOut = value => {
    value = clamp(value);
    return value < 0.5 ? 4 * value * value * value : 1 - Math.pow(-2 * value + 2, 3) / 2;
  };
  const lerp = (a, b, t) => a + (b - a) * t;

  function setStatus(title, detail){
    status.innerHTML = `<strong>${title}</strong>${detail}`;
  }

  function padNumber(value, size){
    return String(value).padStart(size, "0");
  }

  function downloadBlob(blob, filename){
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    link.remove();
    setTimeout(() => URL.revokeObjectURL(url), 4000);
  }

  function crcTable(){
    const table = new Uint32Array(256);
    for(let n = 0; n < 256; n += 1){
      let c = n;
      for(let k = 0; k < 8; k += 1){
        c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
      }
      table[n] = c >>> 0;
    }
    return table;
  }

  const crcLookup = crcTable();

  function crc32(data){
    let crc = 0xffffffff;
    for(let i = 0; i < data.length; i += 1){
      crc = crcLookup[(crc ^ data[i]) & 0xff] ^ (crc >>> 8);
    }
    return (crc ^ 0xffffffff) >>> 0;
  }

  function createZip(entries){
    const encoder = new TextEncoder();
    const localParts = [];
    const centralParts = [];
    let offset = 0;
    const now = new Date();
    const dosTime = (now.getHours() << 11) | (now.getMinutes() << 5) | Math.floor(now.getSeconds() / 2);
    const dosDate = ((now.getFullYear() - 1980) << 9) | ((now.getMonth() + 1) << 5) | now.getDate();

    entries.forEach(entry => {
      const name = encoder.encode(entry.name);
      const data = entry.data;
      const crc = crc32(data);
      const local = new Uint8Array(30 + name.length + data.length);
      const localView = new DataView(local.buffer);
      localView.setUint32(0, 0x04034b50, true);
      localView.setUint16(4, 20, true);
      localView.setUint16(8, 0, true);
      localView.setUint16(10, dosTime, true);
      localView.setUint16(12, dosDate, true);
      localView.setUint32(14, crc, true);
      localView.setUint32(18, data.length, true);
      localView.setUint32(22, data.length, true);
      localView.setUint16(26, name.length, true);
      local.set(name, 30);
      local.set(data, 30 + name.length);
      localParts.push(local);

      const central = new Uint8Array(46 + name.length);
      const centralView = new DataView(central.buffer);
      centralView.setUint32(0, 0x02014b50, true);
      centralView.setUint16(4, 20, true);
      centralView.setUint16(6, 20, true);
      centralView.setUint16(10, 0, true);
      centralView.setUint16(12, dosTime, true);
      centralView.setUint16(14, dosDate, true);
      centralView.setUint32(16, crc, true);
      centralView.setUint32(20, data.length, true);
      centralView.setUint32(24, data.length, true);
      centralView.setUint16(28, name.length, true);
      centralView.setUint32(42, offset, true);
      central.set(name, 46);
      centralParts.push(central);
      offset += local.length;
    });

    const centralSize = centralParts.reduce((total, part) => total + part.length, 0);
    const end = new Uint8Array(22);
    const endView = new DataView(end.buffer);
    endView.setUint32(0, 0x06054b50, true);
    endView.setUint16(8, entries.length, true);
    endView.setUint16(10, entries.length, true);
    endView.setUint32(12, centralSize, true);
    endView.setUint32(16, offset, true);

    return new Blob([...localParts, ...centralParts, end], { type:"application/zip" });
  }

  function canvasPngBytes(){
    return new Promise((resolve, reject) => {
      canvas.toBlob(blob => {
        if(!blob){
          reject(new Error("Could not create PNG frame."));
          return;
        }
        blob.arrayBuffer().then(buffer => resolve(new Uint8Array(buffer))).catch(reject);
      }, "image/png");
    });
  }

  function textWidth(text, tracking){
    let width = 0;
    for(let i = 0; i < text.length; i += 1){
      width += ctx.measureText(text[i]).width;
      if(i < text.length - 1) width += tracking;
    }
    return width;
  }

  function drawTrackedText(text, x, y, tracking){
    const width = textWidth(text, tracking);
    let cursor = x - width / 2;
    for(let i = 0; i < text.length; i += 1){
      const char = text[i];
      ctx.fillText(char, cursor, y);
      cursor += ctx.measureText(char).width + tracking;
    }
  }

  function drawRevealedText(text, x, y, font, tracking, color, show, blur = 0){
    if(show <= 0) return;
    ctx.save();
    ctx.font = font;
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    ctx.fillStyle = color;
    ctx.globalAlpha = easeOut(show);
    ctx.shadowColor = "rgba(216,183,110,0.18)";
    ctx.shadowBlur = blur;
    ctx.translate(0, lerp(18, 0, easeOut(show)));
    drawTrackedText(text, x, y, tracking);
    ctx.restore();
  }

  function drawBackground(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  function drawTintedLogo(show){
    if(!logo.complete || show <= 0) return;

    const eased = easeOut(show);
    const crop = { x:260, y:116, width:500, height:230 };
    const width = 245;
    const height = 112;
    const x = (canvas.width - width) / 2;
    const y = 192 - height / 2 + lerp(10, 0, eased);
    const buffer = document.createElement("canvas");
    const bctx = buffer.getContext("2d");

    buffer.width = width;
    buffer.height = height;
    bctx.drawImage(logo, crop.x, crop.y, crop.width, crop.height, 0, 0, width, height);
    bctx.globalCompositeOperation = "source-in";

    const tint = bctx.createLinearGradient(0, 0, width, height);
    tint.addColorStop(0, "#8f6f2f");
    tint.addColorStop(0.32, "#f0dca8");
    tint.addColorStop(0.58, "#fff8de");
    tint.addColorStop(1, "#d8b76e");
    bctx.fillStyle = tint;
    bctx.fillRect(0, 0, width, height);

    ctx.save();
    ctx.globalAlpha = eased;
    ctx.shadowColor = "rgba(216,183,110,0.48)";
    ctx.shadowBlur = 26;
    ctx.drawImage(buffer, x, y, width, height);
    ctx.restore();
  }

  function drawTitle(time){
    drawBackground();

    const logoShow = clamp((time - 0.18) / 0.68);
    const studioShow = clamp((time - 0.72) / 0.72);
    const namesShow = clamp((time - 1.08) / 0.88);
    const surnameShow = clamp((time - 1.72) / 0.9);
    drawTintedLogo(logoShow);

    drawRevealedText(
      "NC STUDIOS | VIDEOGRAPHY",
      960,
      333,
      `28px ${vogueFont}`,
      9.5,
      "rgba(248,243,235,0.94)",
      studioShow,
      0
    );

    drawRevealedText(
      "MARVIN & BLESSING",
      960,
      506,
      `112px ${vogueFont}`,
      16,
      "#fbf6ee",
      namesShow,
      0
    );

    drawRevealedText(
      "ACHEAMPONG",
      960,
      666,
      `62px ${vogueFont}`,
      27,
      "rgba(248,243,235,0.94)",
      surnameShow,
      0
    );
  }

  function drawFrame(now){
    if(exportingFrames){
      requestAnimationFrame(drawFrame);
      return;
    }
    const elapsed = (now - startTime) / 1000;
    const time = recording ? Math.min(elapsed, duration) : elapsed % duration;
    drawTitle(time);
    requestAnimationFrame(drawFrame);
  }

  function preview(){
    startTime = performance.now();
    setStatus("Marvin & Blessing Acheampong", "Previewing the transparent Vogue-style title reveal.");
  }

  async function saveStill(){
    drawTitle(duration);
    try{
      const data = await canvasPngBytes();
      downloadBlob(new Blob([data], { type:"image/png" }), "marvin-blessing-acheampong-title.png");
      setStatus("Still saved", "Downloaded transparent marvin-blessing-acheampong-title.png");
    }catch(error){
      setStatus("Still export failed", "Safari could not create the PNG still. Try the Safari frames button instead.");
    }
  }

  function pickMimeType(){
    const types = [
      "video/webm;codecs=vp9",
      "video/webm;codecs=vp8",
      "video/webm"
    ];
    return types.find(type => window.MediaRecorder && MediaRecorder.isTypeSupported(type)) || "";
  }

  async function saveFrameSequence(){
    const frameRate = 15;
    const totalFrames = Math.round(duration * frameRate);
    const entries = [];

    exportingFrames = true;
    recording = false;
    framesBtn.disabled = true;
    videoBtn.disabled = true;
    pngBtn.disabled = true;
    previewBtn.disabled = true;
    framesBtn.textContent = "saving...";

    try{
      for(let frame = 0; frame < totalFrames; frame += 1){
        const time = frame / frameRate;
        drawTitle(Math.min(time, duration));
        entries.push({
          name:`marvin-blessing-acheampong-title/frame_${padNumber(frame + 1, 4)}.png`,
          data:await canvasPngBytes()
        });
        if(frame % 10 === 0){
          setStatus("Saving Safari frames", `${frame + 1} of ${totalFrames} transparent PNG frames.`);
        }
      }

      downloadBlob(createZip(entries), "marvin-blessing-acheampong-title-png-sequence.zip");
      setStatus("Saved Safari frames", "Downloaded marvin-blessing-acheampong-title-png-sequence.zip");
    }catch(error){
      setStatus("Frame export failed", "Safari could not finish the PNG sequence. Try save still, then screen record as a fallback.");
    }finally{
      exportingFrames = false;
      framesBtn.disabled = false;
      videoBtn.disabled = false;
      pngBtn.disabled = false;
      previewBtn.disabled = false;
      framesBtn.textContent = "save Safari frames";
      videoBtn.textContent = "save WebM video";
      startTime = performance.now();
    }
  }

  function saveVideo(){
    if(!window.MediaRecorder || !canvas.captureStream){
      saveFrameSequence();
      return;
    }

    recording = true;
    videoBtn.disabled = true;
    framesBtn.disabled = true;
    pngBtn.disabled = true;
    previewBtn.disabled = true;
    videoBtn.textContent = "recording...";

    const mimeType = pickMimeType();
    if(!mimeType){
      videoBtn.textContent = "save WebM video";
      saveFrameSequence();
      return;
    }

    try{
      const extension = "webm";
      const stream = canvas.captureStream(60);
      const chunks = [];
      const recorder = new MediaRecorder(stream, { mimeType });

      recorder.ondataavailable = event => {
        if(event.data && event.data.size) chunks.push(event.data);
      };

      recorder.onerror = () => {
        stream.getTracks().forEach(track => track.stop());
        videoBtn.disabled = false;
        framesBtn.disabled = false;
        pngBtn.disabled = false;
        previewBtn.disabled = false;
        videoBtn.textContent = "save WebM video";
        recording = false;
        setStatus("Recording failed", "Safari cannot reliably create transparent WebM. Use save Safari frames instead.");
      };

      recorder.onstop = () => {
        stream.getTracks().forEach(track => track.stop());
        if(!chunks.length){
          videoBtn.disabled = false;
          framesBtn.disabled = false;
          pngBtn.disabled = false;
          previewBtn.disabled = false;
          videoBtn.textContent = "save WebM video";
          recording = false;
          setStatus("No video created", "Safari cannot reliably create transparent WebM. Use save Safari frames instead.");
          return;
        }

        const blob = new Blob(chunks, { type:mimeType || "video/webm" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `marvin-blessing-acheampong-title.${extension}`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 4000);
        videoBtn.disabled = false;
        framesBtn.disabled = false;
        pngBtn.disabled = false;
        previewBtn.disabled = false;
        videoBtn.textContent = "save WebM video";
        recording = false;
        setStatus("Video saved", `Downloaded transparent marvin-blessing-acheampong-title.${extension}`);
      };

      recorder.start(250);
      startTime = performance.now();
      setStatus("Recording transparent title video", "Wait about 5 seconds. The download starts after the title reveal finishes.");
      setTimeout(() => {
        if(recording && recorder.state !== "inactive"){
          recorder.requestData();
          recorder.stop();
        }
      }, duration * 1000 + 220);
    }catch(error){
      videoBtn.disabled = false;
      framesBtn.disabled = false;
      pngBtn.disabled = false;
      previewBtn.disabled = false;
      videoBtn.textContent = "save WebM video";
      recording = false;
      setStatus("Recording failed", "Safari cannot reliably create transparent WebM. Use save Safari frames instead.");
    }
  }

  previewBtn.addEventListener("click", preview);
  pngBtn.addEventListener("click", saveStill);
  framesBtn.addEventListener("click", saveFrameSequence);
  videoBtn.addEventListener("click", saveVideo);
  logo.addEventListener("load", preview, { once:true });
  drawFrame(performance.now());
})();
</script>
</body>
</html>
