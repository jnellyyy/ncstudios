<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NC Studio Watermark Reveal Export</title>
<style>
@font-face{
  font-family:"NC Studio Brand";
  src:url("assets/fonts/NC_Font_.ttf") format("truetype");
  font-weight:400;
  font-style:normal;
  font-display:swap;
}

:root{
  --ink:#050507;
  --panel:rgba(15,15,18,0.72);
  --line:rgba(216,183,110,0.26);
  --gold:#d8b76e;
  --gold-soft:#f0dca8;
  --cream:#fff8de;
  --text:#f9f3e6;
  --muted:#b9ad96;
}

*{box-sizing:border-box;}

html,
body{
  margin:0;
  min-height:100%;
  background:#050507;
  color:var(--text);
  font-family:"NC Studio Brand",sans-serif;
}

body{
  display:grid;
  min-height:100svh;
  grid-template-rows:1fr auto;
  overflow:hidden;
}

.stage{
  display:grid;
  place-items:center;
  padding:18px;
  background:#050507;
}

.frame{
  width:min(1180px,100%);
  aspect-ratio:16 / 9;
  border:1px solid rgba(216,183,110,0.28);
  background-color:#111;
  background-image:
    linear-gradient(45deg,rgba(255,255,255,0.055) 25%,transparent 25%),
    linear-gradient(-45deg,rgba(255,255,255,0.055) 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,rgba(255,255,255,0.055) 75%),
    linear-gradient(-45deg,transparent 75%,rgba(255,255,255,0.055) 75%);
  background-position:0 0,0 12px,12px -12px,-12px 0;
  background-size:24px 24px;
  box-shadow:0 30px 90px rgba(0,0,0,0.62);
}

canvas{
  display:block;
  width:100%;
  height:100%;
}

.controls{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  padding:12px 16px calc(12px + env(safe-area-inset-bottom));
  background:rgba(5,5,7,0.88);
  border-top:1px solid rgba(216,183,110,0.18);
  backdrop-filter:blur(18px);
}

.status{
  min-width:0;
  color:var(--muted);
  font-size:13px;
  line-height:1.35;
}

.status strong{
  display:block;
  color:var(--text);
  font-size:14px;
  font-weight:650;
}

.actions{
  display:flex;
  gap:8px;
  flex:0 0 auto;
}

button{
  border:1px solid rgba(216,183,110,0.34);
  background:linear-gradient(180deg,rgba(255,248,222,0.15),rgba(216,183,110,0.09));
  color:var(--text);
  min-height:44px;
  padding:0 14px;
  border-radius:8px;
  font:inherit;
  font-weight:650;
  cursor:pointer;
}

button.primary{
  background:linear-gradient(180deg,rgba(240,220,168,0.92),rgba(216,183,110,0.84));
  color:#11100d;
  border-color:rgba(255,248,222,0.6);
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

@media(max-width:720px){
  body{overflow:auto;}
  .stage{padding:10px;}
  .controls{
    align-items:stretch;
    flex-direction:column;
  }
  .actions{
    width:100%;
  }
  button{
    flex:1;
  }
}
</style>
</head>
<body>
  <main class="stage">
    <div class="frame">
      <canvas id="introCanvas" width="1920" height="1080" aria-label="NC Studio watermark reveal preview"></canvas>
    </div>
  </main>

  <footer class="controls">
    <div class="status" id="status">
      <strong>NC watermark reveal</strong>
      Transparent 1920 x 1080, 30fps Safari frame sequence for Premiere.
    </div>
    <div class="actions">
      <button type="button" id="previewBtn">preview again</button>
      <button type="button" class="primary" id="framesBtn">save Safari frames</button>
      <button type="button" id="recordBtn">save video</button>
    </div>
  </footer>

<script>
(() => {
  const canvas = document.getElementById("introCanvas");
  const ctx = canvas.getContext("2d", { alpha: true });
  const previewBtn = document.getElementById("previewBtn");
  const framesBtn = document.getElementById("framesBtn");
  const recordBtn = document.getElementById("recordBtn");
  const status = document.getElementById("status");
  const duration = 4;
  const logo = new Image();
  const markLogo = new Image();
  let startTime = performance.now();
  let rafId = 0;
  let recording = false;
  let exportingFrames = false;

  logo.src = "ncstudios-logo-transparent.png?v=brand-20260612";
  markLogo.src = "ncstudios-logo-mark-transparent.png?v=brand-20260612";

  const clamp = (value, min = 0, max = 1) => Math.min(max, Math.max(min, value));
  const easeOut = value => 1 - Math.pow(1 - clamp(value), 3);
  const easeInOut = value => {
    value = clamp(value);
    return value < 0.5 ? 4 * value * value * value : 1 - Math.pow(-2 * value + 2, 3) / 2;
  };
  const lerp = (a, b, t) => a + (b - a) * t;

  function setStatus(title, detail){
    status.innerHTML = `<strong>${title}</strong>${detail}`;
  }

  function padNumber(value, size){
    return String(value).padStart(size, "0");
  }

  function downloadBlob(blob, filename){
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    link.remove();
    setTimeout(() => URL.revokeObjectURL(url), 4000);
  }

  function crcTable(){
    const table = new Uint32Array(256);
    for(let n = 0; n < 256; n += 1){
      let c = n;
      for(let k = 0; k < 8; k += 1){
        c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
      }
      table[n] = c >>> 0;
    }
    return table;
  }

  const crcLookup = crcTable();

  function crc32(data){
    let crc = 0xffffffff;
    for(let i = 0; i < data.length; i += 1){
      crc = crcLookup[(crc ^ data[i]) & 0xff] ^ (crc >>> 8);
    }
    return (crc ^ 0xffffffff) >>> 0;
  }

  function createZip(entries){
    const encoder = new TextEncoder();
    const localParts = [];
    const centralParts = [];
    let offset = 0;
    const now = new Date();
    const dosTime = (now.getHours() << 11) | (now.getMinutes() << 5) | Math.floor(now.getSeconds() / 2);
    const dosDate = ((now.getFullYear() - 1980) << 9) | ((now.getMonth() + 1) << 5) | now.getDate();

    entries.forEach(entry => {
      const name = encoder.encode(entry.name);
      const data = entry.data;
      const crc = crc32(data);
      const local = new Uint8Array(30 + name.length + data.length);
      const localView = new DataView(local.buffer);
      localView.setUint32(0, 0x04034b50, true);
      localView.setUint16(4, 20, true);
      localView.setUint16(8, 0, true);
      localView.setUint16(10, dosTime, true);
      localView.setUint16(12, dosDate, true);
      localView.setUint32(14, crc, true);
      localView.setUint32(18, data.length, true);
      localView.setUint32(22, data.length, true);
      localView.setUint16(26, name.length, true);
      local.set(name, 30);
      local.set(data, 30 + name.length);
      localParts.push(local);

      const central = new Uint8Array(46 + name.length);
      const centralView = new DataView(central.buffer);
      centralView.setUint32(0, 0x02014b50, true);
      centralView.setUint16(4, 20, true);
      centralView.setUint16(6, 20, true);
      centralView.setUint16(10, 0, true);
      centralView.setUint16(12, dosTime, true);
      centralView.setUint16(14, dosDate, true);
      centralView.setUint32(16, crc, true);
      centralView.setUint32(20, data.length, true);
      centralView.setUint32(24, data.length, true);
      centralView.setUint16(28, name.length, true);
      centralView.setUint32(42, offset, true);
      central.set(name, 46);
      centralParts.push(central);
      offset += local.length;
    });

    const centralSize = centralParts.reduce((total, part) => total + part.length, 0);
    const end = new Uint8Array(22);
    const endView = new DataView(end.buffer);
    endView.setUint32(0, 0x06054b50, true);
    endView.setUint16(8, entries.length, true);
    endView.setUint16(10, entries.length, true);
    endView.setUint32(12, centralSize, true);
    endView.setUint32(16, offset, true);

    return new Blob([...localParts, ...centralParts, end], { type:"application/zip" });
  }

  function canvasPngBytes(){
    return new Promise((resolve, reject) => {
      canvas.toBlob(blob => {
        if(!blob){
          reject(new Error("Could not create PNG frame."));
          return;
        }
        blob.arrayBuffer().then(buffer => resolve(new Uint8Array(buffer))).catch(reject);
      }, "image/png");
    });
  }

  function drawLogoImage(image, targetWidth, alpha, xOffset = 0, clipRight = 0, blur = 0){
    if(!image.complete) return;
    const ratio = image.height / image.width;
    const width = targetWidth;
    const height = width * ratio;
    const x = (canvas.width - width) / 2 + xOffset;
    const y = (canvas.height - height) / 2;

    ctx.save();
    ctx.globalAlpha = alpha;
    if(blur > 0) ctx.filter = `blur(${blur}px)`;
    if(clipRight > 0){
      ctx.beginPath();
      ctx.rect(x, y, width * (1 - clipRight), height);
      ctx.clip();
    }
    ctx.drawImage(image, x, y, width, height);
    ctx.restore();
  }

  function drawBeam(progress){
    if(progress <= 0 || progress >= 1) return;
    const x = lerp(-260, canvas.width + 260, progress);
    ctx.save();
    ctx.globalCompositeOperation = "screen";
    ctx.translate(x, canvas.height / 2);
    ctx.rotate(-0.075);

    const beam = ctx.createLinearGradient(-80, 0, 80, 0);
    beam.addColorStop(0, "rgba(255,248,222,0)");
    beam.addColorStop(0.44, "rgba(255,248,222,0.54)");
    beam.addColorStop(0.5, "rgba(216,183,110,0.94)");
    beam.addColorStop(0.56, "rgba(255,248,222,0.52)");
    beam.addColorStop(1, "rgba(255,248,222,0)");
    ctx.fillStyle = beam;
    ctx.filter = "blur(1px)";
    ctx.fillRect(-95, -310, 190, 620);

    ctx.filter = "blur(0px)";
    ctx.fillStyle = "rgba(255,248,222,0.85)";
    ctx.fillRect(-2, -300, 4, 600);
    ctx.restore();
  }

  function drawSparkles(time){
    if(time < 1.42 || time > 2.18) return;
    ctx.save();
    ctx.globalCompositeOperation = "screen";
    for(let i = 0; i < 5; i += 1){
      const phase = (time * 3.2 + i * 0.37) % 1;
      const x = canvas.width / 2 - 320 + 640 * phase;
      const y = canvas.height / 2 - 120 + 240 * (((i * 37) % 100) / 100);
      const alpha = Math.max(0, 1 - Math.abs(phase - 0.5) * 2) * 0.58;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = "#fff8de";
      ctx.beginPath();
      ctx.arc(x, y, 2.4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawAtTime(time){
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const fullIn = easeOut(time / 0.45);
    const cut = easeInOut((time - 1.38) / 0.72);
    const fullFade = 1 - clamp((time - 1.55) / 0.48);
    const fullAlpha = fullIn * fullFade;
    const fullWidth = lerp(980, 900, cut);

    if(fullAlpha > 0){
      drawLogoImage(logo, fullWidth, fullAlpha * 0.28, -82 * cut, 0.58 * cut, 10);
      drawLogoImage(logo, fullWidth, fullAlpha, -82 * cut, 0.58 * cut, cut * 1.2);
    }

    const markReveal = easeOut((time - 1.42) / 0.68);
    const markFade = time < 3.45 ? 1 : 1 - clamp((time - 3.45) / 0.45);
    const pulse = 1 + 0.045 * Math.sin(Math.max(0, time - 1.55) * Math.PI * 4.4) * Math.max(0, 1 - clamp((time - 1.55) / 1.4));
    const markAlpha = markReveal * markFade;

    if(markAlpha > 0){
      const markWidth = 640 * lerp(0.88, 1, markReveal) * pulse;
      drawLogoImage(markLogo, markWidth, markAlpha * 0.42, 0, 0, 12);
      drawLogoImage(markLogo, markWidth, markAlpha, 0, 0, 0);
    }

    drawBeam((time - 1.24) / 0.98);
    drawSparkles(time);
  }

  function drawFrame(now){
    if(exportingFrames){
      rafId = requestAnimationFrame(drawFrame);
      return;
    }
    const elapsed = (now - startTime) / 1000;
    const time = recording ? Math.min(elapsed, duration) : elapsed % duration;
    drawAtTime(time);
    rafId = requestAnimationFrame(drawFrame);
  }

  function preview(){
    startTime = performance.now();
    setStatus("NC watermark reveal", "Previewing the transparent full-logo-to-[nc] watermark animation.");
  }

  function pickMimeType(){
    const types = [
      "video/mp4;codecs=hvc1",
      "video/mp4",
      "video/webm;codecs=vp9",
      "video/webm;codecs=vp8",
      "video/webm"
    ];
    return types.find(type => window.MediaRecorder && MediaRecorder.isTypeSupported(type)) || "";
  }

  async function saveFrameSequence(){
    const frameRate = 30;
    const totalFrames = Math.round(duration * frameRate);
    const entries = [];

    exportingFrames = true;
    recording = false;
    framesBtn.disabled = true;
    recordBtn.disabled = true;
    previewBtn.disabled = true;
    framesBtn.textContent = "saving...";

    try{
      for(let frame = 0; frame < totalFrames; frame += 1){
        const time = frame / frameRate;
        drawAtTime(Math.min(time, duration));
        entries.push({
          name:`nc-studio-watermark-reveal/frame_${padNumber(frame + 1, 4)}.png`,
          data:await canvasPngBytes()
        });
        if(frame % 10 === 0){
          setStatus("Saving Safari frames", `${frame + 1} of ${totalFrames} transparent PNG frames.`);
        }
      }

      downloadBlob(createZip(entries), "nc-studio-watermark-reveal-png-sequence.zip");
      setStatus("Saved Safari frames", "Downloaded nc-studio-watermark-reveal-png-sequence.zip");
    }catch(error){
      setStatus("Frame export failed", "Safari could not finish the PNG sequence. Try saving a shorter export or screen record as a fallback.");
    }finally{
      exportingFrames = false;
      framesBtn.disabled = false;
      recordBtn.disabled = false;
      previewBtn.disabled = false;
      framesBtn.textContent = "save Safari frames";
      recordBtn.textContent = "save video";
      startTime = performance.now();
    }
  }

  async function recordIntro(){
    if(!window.MediaRecorder || !canvas.captureStream){
      await saveFrameSequence();
      return;
    }

    recording = true;
    recordBtn.disabled = true;
    framesBtn.disabled = true;
    previewBtn.disabled = true;
    recordBtn.textContent = "recording...";
    const mimeType = pickMimeType();
    if(!mimeType){
      recordBtn.textContent = "save video";
      await saveFrameSequence();
      return;
    }

    try{
      const extension = mimeType.includes("mp4") ? "mp4" : "webm";
      const stream = canvas.captureStream(60);
      const chunks = [];
      const recorder = new MediaRecorder(stream, { mimeType });

      recorder.ondataavailable = event => {
        if(event.data && event.data.size) chunks.push(event.data);
      };

      recorder.onerror = () => {
        stream.getTracks().forEach(track => track.stop());
        recordBtn.disabled = false;
        framesBtn.disabled = false;
        previewBtn.disabled = false;
        recordBtn.textContent = "save video";
        recording = false;
        setStatus("Recording failed", "If this browser cannot make a transparent video, use save Safari frames and import the PNG sequence into Premiere.");
      };

      recorder.onstop = () => {
        stream.getTracks().forEach(track => track.stop());
        if(!chunks.length){
          recordBtn.disabled = false;
          framesBtn.disabled = false;
          previewBtn.disabled = false;
          recordBtn.textContent = "save video";
          recording = false;
          setStatus("No video created", "If this browser cannot make a transparent video, use save Safari frames and import the PNG sequence into Premiere.");
          return;
        }

        const blob = new Blob(chunks, { type:mimeType || "video/webm" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `nc-studio-watermark-reveal.${extension}`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 4000);
        recordBtn.disabled = false;
        framesBtn.disabled = false;
        previewBtn.disabled = false;
        recordBtn.textContent = "save video";
        recording = false;
        setStatus("Saved", `Downloaded transparent nc-studio-watermark-reveal.${extension}`);
      };

      recorder.start(250);
      startTime = performance.now();
      setStatus("Recording transparent video", "Wait about 5 seconds. The download starts after the watermark reveal finishes.");
      setTimeout(() => {
        if(recording && recorder.state !== "inactive"){
          recorder.requestData();
          recorder.stop();
        }
      }, duration * 1000 + 220);
    }catch(error){
      recordBtn.disabled = false;
      framesBtn.disabled = false;
      previewBtn.disabled = false;
      recordBtn.textContent = "save video";
      recording = false;
      setStatus("Recording failed", "If this browser cannot make a transparent video, use save Safari frames and import the PNG sequence into Premiere.");
    }
  }

  previewBtn.addEventListener("click", preview);
  framesBtn.addEventListener("click", saveFrameSequence);
  recordBtn.addEventListener("click", recordIntro);
  function maybePreview(){
    if(logo.complete && markLogo.complete) preview();
  }
  logo.addEventListener("load", maybePreview, { once:true });
  markLogo.addEventListener("load", maybePreview, { once:true });
  maybePreview();
  drawFrame(performance.now());
})();
</script>
</body>
</html>
