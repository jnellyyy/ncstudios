<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NC Studio Watermark Reveal Export</title>
<style>
@font-face{
  font-family:"NC Studio Brand";
  src:url("assets/fonts/NC_Font_.ttf?v=brand-20260612b") format("truetype");
  font-weight:400;
  font-style:normal;
  font-display:swap;
}

@font-face{
  font-family:"NC Studio Brand Lighter";
  src:url("assets/fonts/NC_Font_Lighter.ttf?v=brand-20260612b") format("truetype");
  font-weight:400;
  font-style:normal;
  font-display:swap;
}

:root{
  --ink:#050507;
  --panel:rgba(15,15,18,0.72);
  --line:rgba(216,183,110,0.26);
  --gold:#d8b76e;
  --gold-soft:#f0dca8;
  --cream:#fff8de;
  --text:#f9f3e6;
  --muted:#b9ad96;
}

*{box-sizing:border-box;}

html,
body{
  margin:0;
  min-height:100%;
  background:#050507;
  color:var(--text);
  font-family:"NC Studio Brand",sans-serif;
}

body{
  display:grid;
  min-height:100svh;
  grid-template-rows:1fr auto;
  overflow:hidden;
}

.stage{
  display:grid;
  place-items:center;
  padding:18px;
  background:#050507;
}

.frame{
  width:min(1180px,100%);
  aspect-ratio:16 / 9;
  border:1px solid rgba(216,183,110,0.28);
  background-color:#111;
  background-image:
    linear-gradient(45deg,rgba(255,255,255,0.055) 25%,transparent 25%),
    linear-gradient(-45deg,rgba(255,255,255,0.055) 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,rgba(255,255,255,0.055) 75%),
    linear-gradient(-45deg,transparent 75%,rgba(255,255,255,0.055) 75%);
  background-position:0 0,0 12px,12px -12px,-12px 0;
  background-size:24px 24px;
  box-shadow:0 30px 90px rgba(0,0,0,0.62);
}

canvas{
  display:block;
  width:100%;
  height:100%;
}

.controls{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  padding:12px 16px calc(12px + env(safe-area-inset-bottom));
  background:rgba(5,5,7,0.88);
  border-top:1px solid rgba(216,183,110,0.18);
  backdrop-filter:blur(18px);
}

.status{
  min-width:0;
  color:var(--muted);
  font-size:13px;
  line-height:1.35;
}

.status strong{
  display:block;
  color:var(--text);
  font-size:14px;
  font-weight:650;
}

.actions{
  display:flex;
  gap:8px;
  flex:0 0 auto;
}

button{
  border:1px solid rgba(216,183,110,0.34);
  background:linear-gradient(180deg,rgba(255,248,222,0.15),rgba(216,183,110,0.09));
  color:var(--text);
  min-height:44px;
  padding:0 14px;
  border-radius:8px;
  font:inherit;
  font-weight:650;
  cursor:pointer;
}

.downloadLink{
  min-height:44px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border:1px solid rgba(216,183,110,0.34);
  border-radius:8px;
  padding:0 14px;
  color:var(--text);
  text-decoration:none;
  background:rgba(255,255,255,0.08);
}

button.primary{
  background:linear-gradient(180deg,rgba(240,220,168,0.92),rgba(216,183,110,0.84));
  color:#11100d;
  border-color:rgba(255,248,222,0.6);
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

@media(max-width:720px){
  body{overflow:auto;}
  .stage{padding:10px;}
  .controls{
    align-items:stretch;
    flex-direction:column;
  }
  .actions{
    width:100%;
  }
  button{
    flex:1;
  }
}
</style>
</head>
<body>
  <main class="stage">
    <div class="frame">
      <canvas id="introCanvas" width="1920" height="1080" aria-label="NC Studio watermark reveal preview"></canvas>
    </div>
  </main>

  <footer class="controls">
    <div class="status" id="status">
      <strong>NC studio watermark reveal</strong>
      Transparent 1920 x 1080, one-motion [nc studio] to [nc], 30fps PNG sequence for Premiere.
    </div>
    <div class="actions">
      <button type="button" id="previewBtn">preview again</button>
      <button type="button" class="primary" id="framesBtn">save Safari frames</button>
      <a class="downloadLink" href="exports/nc-watermark-animation/nc-watermark-animation-png-sequence.zip" download>download ready sequence</a>
    </div>
  </footer>

<script>
(() => {
  const canvas = document.getElementById("introCanvas");
  const ctx = canvas.getContext("2d", { alpha: true });
  const previewBtn = document.getElementById("previewBtn");
  const framesBtn = document.getElementById("framesBtn");
  const status = document.getElementById("status");
  const duration = 4;
  let startTime = performance.now();
  let rafId = 0;
  let exportingFrames = false;

  const clamp = (value, min = 0, max = 1) => Math.min(max, Math.max(min, value));
  const easeOut = value => 1 - Math.pow(1 - clamp(value), 3);
  const easeInOut = value => {
    value = clamp(value);
    return value < 0.5 ? 4 * value * value * value : 1 - Math.pow(-2 * value + 2, 3) / 2;
  };
  const lerp = (a, b, t) => a + (b - a) * t;

  function setStatus(title, detail){
    status.innerHTML = `<strong>${title}</strong>${detail}`;
  }

  function padNumber(value, size){
    return String(value).padStart(size, "0");
  }

  function downloadBlob(blob, filename){
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    link.remove();
    setTimeout(() => URL.revokeObjectURL(url), 4000);
  }

  function crcTable(){
    const table = new Uint32Array(256);
    for(let n = 0; n < 256; n += 1){
      let c = n;
      for(let k = 0; k < 8; k += 1){
        c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
      }
      table[n] = c >>> 0;
    }
    return table;
  }

  const crcLookup = crcTable();

  function crc32(data){
    let crc = 0xffffffff;
    for(let i = 0; i < data.length; i += 1){
      crc = crcLookup[(crc ^ data[i]) & 0xff] ^ (crc >>> 8);
    }
    return (crc ^ 0xffffffff) >>> 0;
  }

  function createZip(entries){
    const encoder = new TextEncoder();
    const localParts = [];
    const centralParts = [];
    let offset = 0;
    const now = new Date();
    const dosTime = (now.getHours() << 11) | (now.getMinutes() << 5) | Math.floor(now.getSeconds() / 2);
    const dosDate = ((now.getFullYear() - 1980) << 9) | ((now.getMonth() + 1) << 5) | now.getDate();

    entries.forEach(entry => {
      const name = encoder.encode(entry.name);
      const data = entry.data;
      const crc = crc32(data);
      const local = new Uint8Array(30 + name.length + data.length);
      const localView = new DataView(local.buffer);
      localView.setUint32(0, 0x04034b50, true);
      localView.setUint16(4, 20, true);
      localView.setUint16(8, 0, true);
      localView.setUint16(10, dosTime, true);
      localView.setUint16(12, dosDate, true);
      localView.setUint32(14, crc, true);
      localView.setUint32(18, data.length, true);
      localView.setUint32(22, data.length, true);
      localView.setUint16(26, name.length, true);
      local.set(name, 30);
      local.set(data, 30 + name.length);
      localParts.push(local);

      const central = new Uint8Array(46 + name.length);
      const centralView = new DataView(central.buffer);
      centralView.setUint32(0, 0x02014b50, true);
      centralView.setUint16(4, 20, true);
      centralView.setUint16(6, 20, true);
      centralView.setUint16(10, 0, true);
      centralView.setUint16(12, dosTime, true);
      centralView.setUint16(14, dosDate, true);
      centralView.setUint32(16, crc, true);
      centralView.setUint32(20, data.length, true);
      centralView.setUint32(24, data.length, true);
      centralView.setUint16(28, name.length, true);
      centralView.setUint32(42, offset, true);
      central.set(name, 46);
      centralParts.push(central);
      offset += local.length;
    });

    const centralSize = centralParts.reduce((total, part) => total + part.length, 0);
    const end = new Uint8Array(22);
    const endView = new DataView(end.buffer);
    endView.setUint32(0, 0x06054b50, true);
    endView.setUint16(8, entries.length, true);
    endView.setUint16(10, entries.length, true);
    endView.setUint32(12, centralSize, true);
    endView.setUint32(16, offset, true);
    return new Blob([...localParts, ...centralParts, end], { type:"application/zip" });
  }

  function canvasPngBytes(){
    return new Promise((resolve, reject) => {
      canvas.toBlob(blob => {
        if(!blob){ reject(new Error("Could not create PNG frame.")); return; }
        blob.arrayBuffer().then(buffer => resolve(new Uint8Array(buffer))).catch(reject);
      }, "image/png");
    });
  }

  function drawWordmark(time, glow = false){
    const fadeIn = 1;
    const collapse = easeInOut((time - 1.18) / 1.08);
    const studioVisible = 1 - collapse;
    const studioAlpha = 1 - easeInOut((time - 1.28) / 0.82);
    const alpha = fadeIn;
    if(alpha <= 0) return;

    const bracketFont = '270px "NC Studio Brand", "NC Studio Brand Lighter", sans-serif';
    const coreFont = '270px "NC Studio Brand", "NC Studio Brand Lighter", sans-serif';
    const studioFont = '270px "NC Studio Brand Lighter", "NC Studio Brand", sans-serif';
    const centerY = canvas.height / 2;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = "#d8b76e";
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    ctx.shadowColor = "rgba(216,183,110,0)";
    ctx.shadowBlur = 0;

    ctx.font = bracketFont;
    const leftW = ctx.measureText("[").width;
    const rightW = ctx.measureText("]").width;
    ctx.font = coreFont;
    const coreW = ctx.measureText("nc").width;
    ctx.font = studioFont;
    const studioGap = 38 * studioVisible;
    const studioText = "studio";
    const studioW = ctx.measureText(studioText).width;
    const visibleStudioW = studioW * studioVisible;
    const totalW = leftW + coreW + studioGap + visibleStudioW + rightW;
    let x = (canvas.width - totalW) / 2;

    ctx.font = bracketFont;
    ctx.fillText("[", x, centerY);
    x += leftW;

    ctx.font = coreFont;
    ctx.fillText("nc", x, centerY);
    x += coreW;
    x += studioGap;

    if(visibleStudioW > 0.5){
      ctx.save();
      ctx.beginPath();
      ctx.rect(x, centerY - 135, visibleStudioW, 270);
      ctx.clip();
      ctx.font = studioFont;
      ctx.globalAlpha *= Math.max(0, Math.min(1, studioAlpha));
      ctx.fillText(studioText, x, centerY);
      ctx.restore();
    }
    x += visibleStudioW;

    ctx.font = bracketFont;
    ctx.fillText("]", x, centerY);
    ctx.restore();
  }

  function drawAtTime(time){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawWordmark(time, false);
  }

  function drawFrame(now){
    if(exportingFrames){ rafId = requestAnimationFrame(drawFrame); return; }
    const elapsed = (now - startTime) / 1000;
    drawAtTime(elapsed % duration);
    rafId = requestAnimationFrame(drawFrame);
  }

  function preview(){
    startTime = performance.now();
    setStatus("NC studio watermark reveal", "Previewing one smooth [nc studio] to [nc] compression.");
  }

  async function saveFrameSequence(){
    const frameRate = 30;
    const totalFrames = Math.round(duration * frameRate);
    const entries = [];
    exportingFrames = true;
    framesBtn.disabled = true;
    previewBtn.disabled = true;
    framesBtn.textContent = "saving...";
    try{
      for(let frame = 0; frame < totalFrames; frame += 1){
        drawAtTime(frame / frameRate);
        entries.push({ name:`nc-studio-watermark-reveal/frame_${padNumber(frame + 1, 4)}.png`, data:await canvasPngBytes() });
        if(frame % 10 === 0) setStatus("Saving frames", `${frame + 1} of ${totalFrames} transparent PNG frames.`);
      }
      downloadBlob(createZip(entries), "nc-studio-watermark-reveal-png-sequence.zip");
      setStatus("Saved frames", "Downloaded nc-studio-watermark-reveal-png-sequence.zip");
    }catch(error){
      setStatus("Frame export failed", "Use the download ready sequence link instead.");
    }finally{
      exportingFrames = false;
      framesBtn.disabled = false;
      previewBtn.disabled = false;
      framesBtn.textContent = "save Safari frames";
      startTime = performance.now();
    }
  }

  previewBtn.addEventListener("click", preview);
  framesBtn.addEventListener("click", saveFrameSequence);
  if(document.fonts && document.fonts.ready){
    document.fonts.ready.then(() => { preview(); drawFrame(performance.now()); });
  }else{
    preview();
    drawFrame(performance.now());
  }
})();
</script>
</body>
</html>
