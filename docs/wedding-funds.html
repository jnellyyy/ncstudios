<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#080806">
  <title>Opening NC Studio app</title>
  <style>
    :root {
      --black: #080806;
      --cream: #f1e7d7;
      --gold: #d7b66c;
      --muted: #b9afa1;
      --line: rgba(215, 182, 108, .24);
      --panel: rgba(18, 16, 12, .92);
      --sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }

    body {
      margin: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      color: var(--cream);
      background: linear-gradient(145deg, #080806, #15110d 58%, #080806);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    main {
      width: min(100%, 520px);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 24px 90px rgba(0, 0, 0, .32);
    }

    img {
      width: 58px;
      height: 58px;
      display: block;
      margin-bottom: 22px;
      object-fit: contain;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 8vw, 44px);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
    }

    a {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(215, 182, 108, .55);
      border-radius: 8px;
      padding: 0 16px;
      color: #17120a;
      background: linear-gradient(135deg, #f1dda9, #d7b66c);
      text-decoration: none;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <img src="ncstudios-logo-mark-transparent.png" alt="NC Studio logo">
    <h1>Opening the app.</h1>
    <p>This page belongs in the private NC Studio app, so it is moving you there now.</p>
    <a id="appLink" href="https://ncstudios.pages.dev/studio-assistant">Open app</a>
  </main>

  <script>
    const appOrigin = "https://ncstudios.pages.dev";
    const page = (location.pathname.split("/").pop() || "dashboard.html").replace(/\.html$/i, "");
    const target = `${appOrigin}/${page}${location.search}${location.hash}`;
    document.getElementById("appLink").href = target;
    window.location.replace(target);
  </script>
</body>
</html>
