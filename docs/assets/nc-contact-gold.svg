<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-labelledby="title desc">
  <title id="title">NC Studios contact icon</title>
  <desc id="desc">Dark NC Studios contact icon with gold light beam, profile, phone and email details.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="64%">
      <stop offset="0" stop-color="#2b2416"/>
      <stop offset="0.58" stop-color="#11100c"/>
      <stop offset="1" stop-color="#050504"/>
    </radialGradient>
    <linearGradient id="goldBeam" x1="188" y1="152" x2="896" y2="916">
      <stop offset="0" stop-color="#8f6f2f"/>
      <stop offset="0.34" stop-color="#d8b76e"/>
      <stop offset="0.62" stop-color="#fff8de"/>
      <stop offset="1" stop-color="#b99546"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.85 0 1 0 0 0.68 0 0 1 0 0.36 0 0 0 0.72 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1080" height="1080" rx="180" fill="url(#bgGlow)"/>
  <path d="M160 760 C300 520 466 286 682 190 C616 346 492 486 350 606 C520 512 712 418 900 326" fill="none" stroke="url(#goldBeam)" stroke-width="20" stroke-linecap="round" opacity="0.32" filter="url(#softGlow)"/>
  <rect x="246" y="258" width="588" height="520" rx="80" fill="#f7efe3" fill-opacity="0.055" stroke="#d8b76e" stroke-opacity="0.34" stroke-width="3"/>
  <circle cx="540" cy="420" r="86" fill="none" stroke="url(#goldBeam)" stroke-width="36" filter="url(#softGlow)"/>
  <path d="M372 638 C402 562 476 530 540 530 C604 530 678 562 708 638" fill="none" stroke="#f0dca8" stroke-width="34" stroke-linecap="round"/>
  <path d="M376 714 H704" stroke="#d8b76e" stroke-width="28" stroke-linecap="round"/>
  <path d="M394 790 H686" stroke="#f0dca8" stroke-opacity="0.72" stroke-width="20" stroke-linecap="round"/>
  <path d="M272 246 L370 246" stroke="#fff8de" stroke-width="16" stroke-linecap="round" opacity="0.72"/>
  <text x="540" y="925" text-anchor="middle" fill="#f7efe3" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="82" font-weight="900" letter-spacing="18">NC</text>
</svg>
