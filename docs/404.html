<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#080806">
  <title>NC Studio | Page not found</title>
  <style>
    :root {
      --black: #080806;
      --cream: #f1e7d7;
      --gold: #d7b66c;
      --muted: #b9afa1;
      --line: rgba(215, 182, 108, .24);
      --panel: rgba(18, 16, 12, .9);
      --sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      color: var(--cream);
      background:
        radial-gradient(circle at 22% 18%, rgba(215, 182, 108, .18), transparent 34%),
        linear-gradient(145deg, #080806, #14110d 58%, #080806);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    main {
      width: min(100%, 560px);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 24px 90px rgba(0, 0, 0, .32);
    }

    img {
      width: 58px;
      height: 58px;
      display: block;
      margin-bottom: 22px;
      object-fit: contain;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 8vw, 48px);
      line-height: .95;
      letter-spacing: 0;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }

    a {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 16px;
      color: var(--cream);
      text-decoration: none;
      font-weight: 800;
    }

    a.primary {
      border-color: rgba(215, 182, 108, .55);
      color: #17120a;
      background: linear-gradient(135deg, #f1dda9, #d7b66c);
    }
  </style>
</head>
<body>
  <main>
    <img src="ncstudios-logo-mark-transparent.png" alt="NC Studio logo">
    <h1>Wrong door.</h1>
    <p id="message">That page is not on the public website. If you were opening the studio app, use the app link below.</p>
    <div class="actions">
      <a class="primary" id="appLink" href="https://ncstudios.pages.dev/">Open app</a>
      <a id="publicLink" href="/">Public website</a>
    </div>
  </main>

  <script>
    const APP_ORIGIN = "https://ncstudios.pages.dev";
    const appRoutes = new Set([
      "admin",
      "bookings",
      "buy-list",
      "call-sheet",
      "clients",
      "consultations",
      "content",
      "crm",
      "dashboard",
      "delivery",
      "finance",
      "gear",
      "lists",
      "messages",
      "projects",
      "quick-capture",
      "shoot-settings",
      "shot-lists",
      "studio-assistant",
      "templates",
      "timeline",
      "wedding-funds"
    ]);

    const fileName = window.location.pathname.split("/").filter(Boolean).pop() || "";
    const route = fileName.replace(/\.html$/i, "");
    const publicHome = window.location.hostname.endsWith("github.io") ? "/ncstudios/" : "/";
    document.getElementById("publicLink").href = publicHome;

    if (appRoutes.has(route)) {
      const appUrl = `${APP_ORIGIN}/${route}${window.location.search}${window.location.hash}`;
      document.getElementById("message").textContent = "That page belongs to the private NC Studio app. Sending you there now.";
      document.getElementById("appLink").href = appUrl;
      window.setTimeout(() => window.location.replace(appUrl), 650);
    }
  </script>
</body>
</html>
