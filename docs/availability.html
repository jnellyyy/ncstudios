<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>availability | nc studio</title>
<meta name="description" content="Check nc studio availability and send a wedding, couple session or content enquiry.">

<link rel="manifest" href="website.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png?v=brand-20260612">
<link rel="icon" href="icon-32.png?v=brand-20260612">
<meta name="theme-color" content="#050504">

<style>
@font-face{
  font-family:"NC Studio Brand";
  src:url("assets/fonts/NC_Font_.ttf?v=brand-20260612b") format("truetype");
  font-weight:400;
  font-style:normal;
  font-display:swap;
}

@font-face{
  font-family:"NC Studio Brand Lighter";
  src:url("assets/fonts/NC_Font_Lighter.ttf?v=brand-20260612b") format("truetype");
  font-weight:400;
  font-style:normal;
  font-display:swap;
}

:root{
  --bg:#050504;
  --bg2:#11100c;
  --ink:#f7efe3;
  --paper:#efe1cc;
  --muted:#b8ac9a;
  --line:rgba(216,183,110,0.26);
  --panel:rgba(5,5,4,0.74);
  --gold:#d8b76e;
  --gold2:#f0dca8;
  --error:#f0a79e;
  --success:#9ee6b7;
  --brand:"NC Studio Brand",Impact,sans-serif;
  --brand-light:"NC Studio Brand Lighter","NC Studio Brand",Impact,sans-serif;
  --mono:"SFMono-Regular","Menlo","Monaco","Courier New",monospace;
  --body:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html{
  background:var(--bg);
}

body{
  margin:0;
  min-height:100vh;
  color:var(--ink);
  background:
    linear-gradient(rgba(216,183,110,0.045) 1px,transparent 1px),
    linear-gradient(90deg,rgba(216,183,110,0.045) 1px,transparent 1px),
    linear-gradient(145deg,var(--bg),var(--bg2));
  background-size:48px 48px,48px 48px,100% 100%;
  font-family:var(--body);
}

body::after{
  content:"";
  position:fixed;
  inset:clamp(10px,2vw,28px);
  pointer-events:none;
  border:1px solid var(--line);
  opacity:0.86;
}

a{
  color:inherit;
  text-decoration:none;
}

button,
input,
select,
textarea{
  font:inherit;
}

.siteHeader{
  position:sticky;
  top:0;
  z-index:10;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  padding:clamp(18px,3vw,34px) clamp(20px,5vw,72px);
  border-bottom:1px solid rgba(216,183,110,0.24);
  background:rgba(5,5,4,0.82);
}

.brand img{
  width:clamp(156px,18vw,240px);
  height:auto;
  display:block;
  filter:drop-shadow(0 8px 20px rgba(216,183,110,0.18));
}

.nav{
  display:flex;
  align-items:center;
  gap:14px;
  font-family:var(--mono);
  font-size:12px;
  text-transform:uppercase;
}

.nav a{
  padding:12px 14px;
  border:1px solid transparent;
}

.nav .navCta{
  border-color:rgba(216,183,110,0.42);
  color:var(--gold2);
}

.availabilityPage{
  width:min(1180px,calc(100% - 40px));
  margin:0 auto;
  padding:clamp(44px,8vw,92px) 0 clamp(48px,8vw,90px);
}

.availabilityHero{
  display:grid;
  grid-template-columns:minmax(0,1.2fr) minmax(260px,0.8fr);
  gap:28px;
  align-items:end;
  padding-bottom:34px;
  border-bottom:1px solid rgba(216,183,110,0.30);
}

.eyebrow,
.pageNote,
.calendarLabel,
.formPanel label,
.formStatus,
.footer{
  font-family:var(--mono);
  letter-spacing:0;
  text-transform:uppercase;
}

.eyebrow{
  margin:0 0 18px;
  color:var(--gold);
  font-size:13px;
}

h1,
h2,
h3{
  margin:0;
  font-family:Georgia,"Times New Roman",serif;
  font-weight:400;
  letter-spacing:0;
}

h1{
  max-width:820px;
  color:var(--gold2);
  font-size:clamp(58px,10vw,136px);
  line-height:0.88;
}

.pageNote{
  margin:0;
  color:var(--paper);
  font-size:14px;
  line-height:1.7;
}

.availabilityLayout{
  display:grid;
  grid-template-columns:minmax(0,1.08fr) minmax(340px,0.92fr);
  gap:18px;
  margin-top:24px;
}

.calendarPanel,
.formPanel{
  border:1px solid var(--line);
  background:
    linear-gradient(180deg,rgba(216,183,110,0.075),rgba(216,183,110,0.02)),
    var(--panel);
  padding:clamp(18px,3vw,30px);
}

.calendarHead{
  display:flex;
  justify-content:space-between;
  gap:16px;
  padding-bottom:18px;
  border-bottom:1px solid rgba(216,183,110,0.20);
}

.calendarHead strong{
  color:var(--gold2);
  font-family:var(--mono);
  font-size:13px;
  text-transform:uppercase;
}

.calendarLabel{
  color:var(--muted);
  font-size:12px;
}

.calendarMonths{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:14px;
  margin-top:18px;
}

.month{
  min-width:0;
}

.month h2{
  color:var(--paper);
  font-family:var(--mono);
  font-size:13px;
  line-height:1.4;
  text-transform:uppercase;
}

.weekdayGrid,
.dayGrid{
  display:grid;
  grid-template-columns:repeat(7,minmax(0,1fr));
  gap:6px;
}

.weekdayGrid{
  margin:14px 0 8px;
  color:var(--muted);
  font-family:var(--mono);
  font-size:10px;
  text-align:center;
  text-transform:uppercase;
}

.calendarDay,
.emptyDay{
  min-width:0;
  aspect-ratio:1;
}

.calendarDay{
  border:1px solid rgba(216,183,110,0.22);
  border-radius:0;
  background:rgba(247,239,227,0.045);
  color:var(--ink);
  font-family:var(--mono);
  font-size:12px;
  cursor:pointer;
}

.calendarDay:not(:disabled):hover,
.calendarDay.is-selected{
  border-color:var(--gold2);
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#080704;
}

.calendarDay:disabled{
  opacity:0.24;
  cursor:not-allowed;
}

.formPanel{
  display:grid;
  gap:16px;
}

.formPanel h2{
  color:var(--gold2);
  font-size:clamp(34px,5vw,58px);
  line-height:0.92;
}

.formPanel p{
  margin:0;
  color:var(--paper);
  line-height:1.62;
}

.formGrid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
}

.field{
  display:grid;
  gap:7px;
}

.field.full{
  grid-column:1 / -1;
}

.formPanel label{
  color:var(--muted);
  font-size:11px;
}

input,
select,
textarea{
  width:100%;
  min-height:48px;
  border:1px solid rgba(216,183,110,0.28);
  border-radius:0;
  background:rgba(5,5,4,0.72);
  color:var(--ink);
  padding:12px;
  outline:none;
}

textarea{
  min-height:132px;
  resize:vertical;
}

input:focus,
select:focus,
textarea:focus{
  border-color:var(--gold2);
  box-shadow:0 0 0 3px rgba(216,183,110,0.14);
}

.submitButton{
  min-height:52px;
  border:1px solid rgba(216,183,110,0.42);
  border-radius:0;
  background:linear-gradient(90deg,var(--gold),var(--gold2));
  color:#080704;
  font-family:var(--mono);
  font-weight:700;
  text-transform:uppercase;
  cursor:pointer;
}

.submitButton:disabled{
  opacity:0.55;
  cursor:wait;
}

.formStatus{
  min-height:18px;
  margin:0;
  color:var(--muted);
  font-size:12px;
}

.formStatus.success{
  color:var(--success);
}

.formStatus.error{
  color:var(--error);
}

.hiddenField{
  position:absolute;
  left:-9999px;
  width:1px;
  height:1px;
  overflow:hidden;
}

.footer{
  width:min(1180px,calc(100% - 40px));
  margin:0 auto;
  padding:20px 0 36px;
  border-top:1px solid rgba(216,183,110,0.24);
  color:var(--muted);
  font-size:11px;
  display:flex;
  justify-content:space-between;
  gap:16px;
}

@media(max-width:980px){
  .availabilityHero,
  .availabilityLayout{
    grid-template-columns:1fr;
  }

  .calendarMonths{
    grid-template-columns:1fr;
  }
}

@media(max-width:640px){
  .siteHeader{
    padding:14px 16px;
  }

  .brand img{
    width:132px;
  }

  .nav a:not(.navCta){
    display:none;
  }

  .availabilityPage{
    width:calc(100% - 32px);
    padding-top:40px;
  }

  h1{
    font-size:58px;
  }

  .formGrid{
    grid-template-columns:1fr;
  }

  .footer{
    width:calc(100% - 32px);
    flex-direction:column;
  }
}
</style>
</head>

<body>
<header class="siteHeader">
  <a class="brand" href="index.html" aria-label="nc studio home">
    <img src="ncstudios-logo-transparent.png?v=brand-20260612" alt="nc studio logo">
  </a>

  <nav class="nav" aria-label="site navigation">
    <a href="index.html#about">about</a>
    <a href="index.html#films">work</a>
    <a class="navCta" href="availability.html">availability</a>
  </nav>
</header>

<main class="availabilityPage">
  <section class="availabilityHero" aria-labelledby="availability-title">
    <div>
      <p class="eyebrow">availability</p>

    <p class="pageNote">pick a date, send the details, then it lands straight inside the studio app.</p>

        <div class="field">

          <label for="email">email</label>

<footer class="footer">

<script>
(function(){
  const calendar = document.querySelector("[data-calendar]");
  const dateInput = document.getElementById("eventDate");

  if(!calendar || !dateInput){
    return;
  }

  const weekdays = ["m","t","w","t","f","s","s"];
  const today = new Date();
  today.setHours(0,0,0,0);

  function pad(number){
    return String(number).padStart(2,"0");
  }

  function toIso(date){
    return date.getFullYear() + "-" + pad(date.getMonth() + 1) + "-" + pad(date.getDate());
  }

  function renderMonth(monthDate){
    const year = monthDate.getFullYear();
    const month = monthDate.getMonth();
    const monthName = monthDate.toLocaleDateString("en-GB",{month:"long",year:"numeric"});
    const firstDay = (new Date(year,month,1).getDay() + 6) % 7;
    const daysInMonth = new Date(year,month + 1,0).getDate();
    let days = "";

    for(let blank = 0; blank < firstDay; blank++){
      days += '<span class="emptyDay" aria-hidden="true"></span>';
    }

    for(let day = 1; day <= daysInMonth; day++){
      const date = new Date(year,month,day);
      const iso = toIso(date);
      const disabled = date < today ? " disabled" : "";
      const selected = dateInput.value === iso ? " is-selected" : "";
      days += '<button class="calendarDay' + selected + '" type="button" data-date="' + iso + '"' + disabled + '>' + day + '</button>';
    }

    return '<section class="month"><h2>' + monthName + '</h2><div class="weekdayGrid">' + weekdays.map(function(day){return "<span>" + day + "</span>";}).join("") + '</div><div class="dayGrid">' + days + "</div></section>";
  }

  function renderCalendar(){
    const now = new Date();
    calendar.innerHTML = [0,1,2].map(function(offset){
      return renderMonth(new Date(now.getFullYear(),now.getMonth() + offset,1));
    }).join("");
  }

  function markSelected(){
    calendar.querySelectorAll(".calendarDay").forEach(function(day){
      day.classList.toggle("is-selected",day.dataset.date === dateInput.value);
    });
  }

  calendar.addEventListener("click",function(event){
    const button = event.target.closest("[data-date]");
    if(!button || button.disabled){
      return;
    }

    dateInput.value = button.dataset.date;
    markSelected();
  });

  dateInput.addEventListener("change",markSelected);
  renderCalendar();
})();
</script>
<script>
(function(){
  const ENQUIRIES_TABLE = "website_enquiries";

  const form = document.getElementById("enquiryForm");
  const statusEl = document.querySelector("[data-form-status]");
  if(!form || !statusEl){
    return;
  }
  const submitButton = form.querySelector("[type='submit']");

  function setStatus(message,type){
    statusEl.textContent = message;
    statusEl.className = "formStatus" + (type ? " " + type : "");
  }

  function value(formData,name){
    return String(formData.get(name) || "").trim();
  }

  function uid(){
    if(window.crypto && crypto.randomUUID){
      return crypto.randomUUID();
    }

    return "website_" + Date.now() + "_" + Math.random().toString(16).slice(2);
  }

  function wait(ms){
    return new Promise(function(resolve){
      setTimeout(resolve,ms);
    });
  }

  async function waitForSupabase(){
    for(let attempt = 0; attempt < 50; attempt++){
      if(window.ncSupabase){
        return true;
      }

      await wait(120);
    }

    return false;
  }

  function buildNotes(data){
    return [
      "website enquiry",
      "email: " + data.email,
      "phone: " + (data.phone || "not provided"),
      "event type: " + data.eventType,
      "partner/client name: " + (data.partnerName || "not provided"),
      "guest count: " + (data.guestCount || "not provided"),
      "package interest: " + (data.packageInterest || "not sure yet"),
      "budget: " + (data.budget || "not provided"),
      "instagram: " + (data.instagram || "not provided"),
      "",
      "message:",
      data.message,
      "",
      "submitted: " + new Date().toLocaleString("en-GB")
    ].join("\n");
  }

  function buildBooking(data){
    const now = new Date().toISOString();
    const eventName = data.eventType ? data.eventType + " enquiry" : "website enquiry";

    return {
      id:uid(),
      clientName:data.fullName,
      eventName:eventName,
      eventDate:data.eventDate,
      status:"enquiry",
      packagePrice:0,
      depositPaid:0,
      location:data.venue,
      nextAction:"reply to website enquiry",
      notes:buildNotes(data),
      source:"website",
      contactEmail:data.email,
      contactPhone:data.phone,
      updatedAt:now,
      createdAt:now
    };
  }

  async function saveBooking(booking){
    const ready = await waitForSupabase();

    if(!ready){
      throw new Error("Booking system is not available yet.");
    }

    const response = await window.ncSupabase
      .from(ENQUIRIES_TABLE)
      .insert(
        {
          id:booking.id,
          data:booking,
          status:"new",
          created_at:booking.createdAt,
          updated_at:booking.updatedAt
        }
      );

    if(response.error){
      throw response.error;
    }

    try{
      const saved = JSON.parse(localStorage.getItem("ncstudios_public_enquiries_v1")) || [];
      localStorage.setItem("ncstudios_public_enquiries_v1",JSON.stringify([booking,...saved].slice(0,20)));
    }catch(error){
      console.warn("Could not mirror enquiry locally",error);
    }
  }

  form.addEventListener("submit",async function(event){
    event.preventDefault();

    const formData = new FormData(form);

    if(value(formData,"companyWebsite")){
      form.reset();
      setStatus("thank you. Your enquiry has been received.","success");
      return;
    }

    const data = {
      fullName:value(formData,"fullName"),
      partnerName:value(formData,"partnerName"),
      email:value(formData,"email"),
      phone:value(formData,"phone"),
      eventType:value(formData,"eventType"),
      eventDate:value(formData,"eventDate"),
      venue:value(formData,"venue"),
      guestCount:value(formData,"guestCount"),
      packageInterest:value(formData,"packageInterest"),
      budget:value(formData,"budget"),
      instagram:value(formData,"instagram"),
      message:value(formData,"message")
    };

    if(!data.fullName || !data.email || !data.eventType || !data.eventDate || !data.message){
      setStatus("please complete your name, email, shoot type, date and message.","error");
      return;
    }

    submitButton.disabled = true;
    setStatus("sending your enquiry...");

    try{
      await saveBooking(buildBooking(data));
      form.reset();
      document.querySelectorAll(".calendarDay.is-selected").forEach(function(day){
        day.classList.remove("is-selected");
      });
      setStatus("thank you. Your enquiry has been received.","success");
    }catch(error){
      console.warn("website enquiry failed",error);
      setStatus("this could not send right now. Please try again in a moment.","error");
    }finally{
      submitButton.disabled = false;
    }
  });
})();
</script>
