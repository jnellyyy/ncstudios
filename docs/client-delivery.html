<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#080806">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Your NC Studio Delivery</title>
  <link rel="icon" href="icon-32.png">
  <style>
    @font-face{font-family:"NC Brand";src:url("assets/fonts/NC_Font_.ttf") format("truetype");font-display:swap}
    @font-face{font-family:"NC Brand Light";src:url("assets/fonts/NC_Font_Lighter.ttf") format("truetype");font-display:swap}
    :root{--bg:#080806;--panel:#100f0c;--line:rgba(215,182,108,.28);--gold:#d7b66c;--gold2:#f0dba4;--cream:#f4ecdf;--muted:#aaa093;--danger:#e0a49c}
    *{box-sizing:border-box}
    html{background:var(--bg);color:var(--cream);font-family:Arial,Helvetica,sans-serif}
    body{min-height:100vh;margin:0;background-image:linear-gradient(rgba(215,182,108,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(215,182,108,.055) 1px,transparent 1px);background-size:52px 52px}
    button,input{font:inherit}
    button,a{touch-action:manipulation}
    button:focus-visible,a:focus-visible,input:focus-visible{outline:2px solid var(--gold2);outline-offset:3px}
    .shell{width:min(1220px,100%);min-height:100vh;margin:auto;border-inline:1px solid rgba(215,182,108,.18);background:rgba(8,8,6,.94)}
    .topbar{height:68px;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:0 clamp(18px,4vw,48px);border-bottom:1px solid var(--line)}
    .brand{display:flex;align-items:center;gap:13px;color:var(--cream);text-decoration:none}
    .brand img{width:42px;height:31px;object-fit:contain}
    .brand strong{font:24px/1 "NC Brand",Impact,sans-serif;color:var(--gold)}
    .brand span,.secure{font:10px/1.2 monospace;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
    .gate{min-height:calc(100vh - 68px);display:grid;place-items:center;padding:42px 20px}
    .gate-box{width:min(610px,100%);padding:clamp(28px,6vw,66px);border:1px solid var(--line);background:rgba(16,15,12,.95);text-align:center}
    .eyebrow{margin:0 0 20px;color:var(--gold);font:10px/1.4 monospace;letter-spacing:.16em;text-transform:uppercase}
    h1,h2,p{margin-top:0}
    .gate h1{margin-bottom:18px;font:clamp(44px,9vw,84px)/.88 "NC Brand Light",Georgia,serif;font-weight:400}
    .gate-copy{max-width:440px;margin:0 auto 28px;color:var(--muted);font-size:15px;line-height:1.65}
    .pin-form{display:grid;grid-template-columns:1fr auto;gap:9px;max-width:390px;margin:auto}
    .pin-form[hidden]{display:none}
    input{width:100%;min-height:48px;padding:12px 14px;border:1px solid var(--line);border-radius:6px;color:var(--cream);background:#0b0a08}
    .button{min-height:48px;padding:0 18px;border:1px solid var(--gold);border-radius:6px;color:#0a0907;background:var(--gold2);font-weight:800;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
    .button.secondary{color:var(--cream);background:transparent}
    .status{min-height:20px;margin:16px 0 0;color:var(--muted);font-size:13px;line-height:1.4}
    .status.error{color:var(--danger)}
    .delivery[hidden],.gate[hidden]{display:none}
    .delivery-head{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(240px,.8fr);min-height:430px;border-bottom:1px solid var(--line)}
    .delivery-intro{display:flex;flex-direction:column;justify-content:flex-end;padding:clamp(32px,7vw,90px)}
    .delivery-intro h1{max-width:780px;margin-bottom:22px;font:clamp(60px,11vw,128px)/.78 "NC Brand Light",Georgia,serif;font-weight:400}
    .delivery-intro p:not(.eyebrow){max-width:650px;margin:0;color:var(--muted);font-size:17px;line-height:1.65}
    .delivery-meta{display:grid;align-content:end;gap:24px;padding:clamp(30px,5vw,62px);border-left:1px solid var(--line);background:#0d0c09}
    .meta-line{padding-top:12px;border-top:1px solid var(--line)}
    .meta-line span{display:block;margin-bottom:7px;color:var(--gold);font:9px monospace;letter-spacing:.14em;text-transform:uppercase}
    .meta-line strong{font-size:15px}
    .files{padding:clamp(32px,6vw,74px)}
    .section-head{display:flex;justify-content:space-between;align-items:end;gap:20px;margin-bottom:26px}
    .section-head h2{margin:0;font:clamp(34px,6vw,64px)/.9 "NC Brand Light",Georgia,serif;font-weight:400}
    .section-head span{color:var(--muted);font:10px monospace;letter-spacing:.1em;text-transform:uppercase}
    .category-block{margin-top:42px}.category-block:first-child{margin-top:0}.category-head{display:flex;align-items:end;justify-content:space-between;gap:18px;margin-bottom:15px;padding-bottom:10px;border-bottom:1px solid var(--line)}.category-head h3{margin:0;font:28px/.95 "NC Brand Light",Georgia,serif;font-weight:400}.category-head span{color:var(--muted);font:9px monospace;text-transform:uppercase}
    .file-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
    .file{min-width:0;border:1px solid var(--line);border-radius:8px;background:var(--panel);overflow:hidden}
    .preview{aspect-ratio:16/9;display:grid;place-items:center;background:#050504;overflow:hidden}
    .preview img,.preview video{width:100%;height:100%;object-fit:contain;background:#050504}
    .file-icon{color:var(--gold);font:700 36px "NC Brand",Impact,sans-serif}
    .file-body{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:16px;align-items:center;padding:15px}
    .file-body strong{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px}
    .file-body small{display:block;margin-top:5px;color:var(--muted);font-size:11px}
    .download{width:42px;height:42px;padding:0;border:1px solid var(--line);border-radius:6px;color:var(--gold2);background:transparent;text-decoration:none;display:grid;place-items:center;font-size:20px}
    .empty{grid-column:1/-1;padding:52px 24px;border:1px dashed var(--line);color:var(--muted);text-align:center}
    .footer{display:flex;justify-content:space-between;gap:20px;padding:24px clamp(20px,5vw,60px);border-top:1px solid var(--line);color:var(--muted);font:10px monospace;letter-spacing:.08em;text-transform:uppercase}
    @media(max-width:760px){.delivery-head{grid-template-columns:1fr;min-height:0}.delivery-intro{min-height:420px}.delivery-meta{border-left:0;border-top:1px solid var(--line)}.file-grid{grid-template-columns:1fr}.secure{display:none}}
    @media(max-width:480px){.topbar{height:58px}.brand strong{font-size:20px}.brand span{display:none}.gate{min-height:calc(100vh - 58px)}.pin-form{grid-template-columns:1fr}.delivery-intro{min-height:390px;padding:50px 20px}.delivery-intro h1{font-size:58px}.delivery-meta,.files{padding:28px 20px}.section-head{align-items:start;flex-direction:column}.footer{flex-direction:column}}
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="brand" href="index.html"><img src="ncstudios-logo-mark-transparent.png" alt=""><strong>NC Studio</strong><span>Private delivery</span></a>
      <span class="secure">Personal access · private files</span>
    </header>

    <main>
      <section class="gate" data-gate>
        <div class="gate-box">
          <p class="eyebrow">NC Studio · Client delivery</p>
          <h1>Your story is ready.</h1>
          <p class="gate-copy" data-gate-copy>Opening your private collection.</p>
          <form class="pin-form" data-pin-form hidden>
            <input data-pin type="password" inputmode="numeric" autocomplete="one-time-code" placeholder="Delivery PIN" aria-label="Delivery PIN" required>
            <button class="button" type="submit">Open</button>
          </form>
          <p class="status" data-status aria-live="polite"></p>
        </div>
      </section>

      <section class="delivery" data-delivery hidden>
        <div class="delivery-head">
          <div class="delivery-intro">
            <p class="eyebrow">NC Studio · Photo + film</p>
            <h1 data-couple>Your delivery</h1>
            <p data-message></p>
          </div>
          <aside class="delivery-meta">
            <div class="meta-line"><span>Collection</span><strong data-project></strong></div>
            <div class="meta-line" data-date-row><span>Date</span><strong data-date></strong></div>
            <div class="meta-line" data-expiry-row><span>Available until</span><strong data-expiry></strong></div>
          </aside>
        </div>

        <div class="files">
          <div class="section-head"><h2>Your files.</h2><span data-file-count></span></div>
          <div data-files></div>
        </div>
      </section>
    </main>

    <footer class="footer"><span>© ncstudiouk</span><span>Creative · intentional · timeless</span></footer>
  </div>

  <script>
    (() => {
      const searchParams = new URLSearchParams(location.search);
      const token = searchParams.get("token") || "";
      const previewMode = searchParams.has("preview");
      const gate = document.querySelector("[data-gate]");
      const deliveryView = document.querySelector("[data-delivery]");
      const pinForm = document.querySelector("[data-pin-form]");
      const pinInput = document.querySelector("[data-pin]");
      const status = document.querySelector("[data-status]");
      const gateCopy = document.querySelector("[data-gate-copy]");
      const CATEGORY_ORDER = ["Details", "Getting Ready", "Ceremony", "Couple Portraits", "Wedding Party & Family", "Reception", "Speeches", "First Dance", "Evening Party", "Films", "Documents", "Unsorted"];
      let session = "";

      const setStatus = (message, error = false) => {
        status.textContent = message;
        status.className = `status${error ? " error" : ""}`;
      };

      async function requestAccess(pin = "") {
        if (!token) {
          gateCopy.textContent = "This delivery link is incomplete.";
          setStatus("Ask NC Studio to resend your personal link.", true);
          return;
        }

        setStatus("Opening your delivery...");
        try {
          const response = await fetch("/api/client-delivery?action=access", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ token, pin })
          });
          const data = await response.json().catch(() => ({}));

          if (data.pinRequired && !pin) {
            gateCopy.textContent = "Enter the PIN sent with your personal delivery link.";
            pinForm.hidden = false;
            setStatus("");
            pinInput.focus();
            return;
          }

          if (!response.ok) throw new Error(data.error || "This delivery cannot be opened.");
          session = data.session;
          renderDelivery(data.delivery);
        } catch (error) {
          setStatus(error.message || "This delivery cannot be opened.", true);
        }
      }

      function renderDelivery(delivery) {
        gate.hidden = true;
        deliveryView.hidden = false;
        document.title = `${delivery.coupleName} · NC Studio Delivery`;
        document.querySelector("[data-couple]").textContent = delivery.coupleName;
        document.querySelector("[data-project]").textContent = delivery.projectTitle || "NC Studio delivery";
        document.querySelector("[data-message]").textContent = delivery.message || "Your photographs and films are ready to view and keep.";
        setOptionalDate("[data-date-row]", "[data-date]", delivery.eventDate);
        setOptionalDate("[data-expiry-row]", "[data-expiry]", delivery.expiresAt);
        const files = Array.isArray(delivery.files) ? delivery.files : [];
        document.querySelector("[data-file-count]").textContent = `${files.length} ${files.length === 1 ? "file" : "files"}`;
        renderFiles(files);
      }

      function setOptionalDate(rowSelector, valueSelector, value) {
        const row = document.querySelector(rowSelector);
        if (!value) {
          row.hidden = true;
          return;
        }
        row.hidden = false;
        document.querySelector(valueSelector).textContent = new Intl.DateTimeFormat("en-GB", { day: "numeric", month: "long", year: "numeric" }).format(new Date(`${value}T12:00:00`));
      }

      function renderFiles(files) {
        const container = document.querySelector("[data-files]");
        container.innerHTML = "";
        if (!files.length) {
          container.innerHTML = '<div class="empty">Your files are being prepared.</div>';
          return;
        }

        const groups = new Map();
        files.forEach(file => {
          const category = CATEGORY_ORDER.includes(file.category) ? file.category : defaultCategory(file);
          if (!groups.has(category)) groups.set(category, []);
          groups.get(category).push(file);
        });

        CATEGORY_ORDER.filter(category => groups.has(category)).forEach(category => {
          const categoryFiles = groups.get(category);
          const section = document.createElement("section");
          section.className = "category-block";
          const heading = document.createElement("div");
          heading.className = "category-head";
          const title = document.createElement("h3");
          title.textContent = category === "Unsorted" ? "More from your day" : category;
          const count = document.createElement("span");
          count.textContent = `${categoryFiles.length} ${categoryFiles.length === 1 ? "file" : "files"}`;
          heading.append(title, count);
          const grid = document.createElement("div");
          grid.className = "file-grid";

          categoryFiles.forEach(file => grid.appendChild(createFileCard(file)));
          section.append(heading, grid);
          container.appendChild(section);
        });
      }

      function createFileCard(file) {
          const article = document.createElement("article");
          article.className = "file";
          const preview = document.createElement("div");
          preview.className = "preview";
          const viewUrl = file.previewUrl || fileUrl(file.id, false);

          if (String(file.type).startsWith("image/")) {
            const image = document.createElement("img");
            image.src = viewUrl;
            image.alt = file.name;
            image.loading = "lazy";
            preview.appendChild(image);
          } else if (String(file.type).startsWith("video/")) {
            const video = document.createElement("video");
            video.src = viewUrl;
            video.controls = true;
            video.playsInline = true;
            video.preload = "none";
            preview.appendChild(video);
          } else {
            const icon = document.createElement("span");
            icon.className = "file-icon";
            icon.textContent = fileExtension(file.name);
            preview.appendChild(icon);
          }

          const body = document.createElement("div");
          body.className = "file-body";
          const copy = document.createElement("div");
          const name = document.createElement("strong");
          name.textContent = file.name;
          const size = document.createElement("small");
          size.textContent = formatBytes(file.size);
          copy.append(name, size);
          const link = document.createElement("a");
          link.className = "download";
          link.href = file.previewUrl || fileUrl(file.id, true);
          link.setAttribute("download", file.name);
          link.setAttribute("aria-label", `Download ${file.name}`);
          link.title = "Download";
          link.textContent = "↓";
          body.append(copy, link);
          article.append(preview, body);
          return article;
      }

      function defaultCategory(file) {
        if (String(file.type).startsWith("video/")) return "Films";
        if (!String(file.type).startsWith("image/")) return "Documents";
        return "Unsorted";
      }

      const fileUrl = (fileId, download) => `/api/client-delivery?action=file&session=${encodeURIComponent(session)}&file=${encodeURIComponent(fileId)}${download ? "&download=1" : ""}`;
      const fileExtension = name => String(name || "FILE").split(".").pop().slice(0, 5).toUpperCase();
      const formatBytes = bytes => {
        const value = Number(bytes || 0);
        if (!value) return "File";
        const units = ["B", "KB", "MB", "GB"];
        const unit = Math.min(Math.floor(Math.log(value) / Math.log(1024)), units.length - 1);
        return `${(value / (1024 ** unit)).toFixed(unit > 1 ? 1 : 0)} ${units[unit]}`;
      };

      pinForm.addEventListener("submit", event => {
        event.preventDefault();
        requestAccess(pinInput.value.trim());
      });

      if (previewMode) {
        renderDelivery({
          coupleName: "Marvin + Blessing",
          projectTitle: "Your wedding films",
          eventDate: "2026-06-12",
          expiresAt: "2026-12-31",
          message: "Your wedding story is ready. Thank you for trusting NC Studio to preserve it.",
          files: [
            { id: "preview-one", name: "Marvin + Blessing · Wedding gallery.zip", type: "application/zip", size: 286110670, category: "Documents" },
            { id: "preview-two", name: "Marvin + Blessing · Highlight film.mp4", type: "video/mp4", size: 911008346, category: "Films" }
          ]
        });
      } else {
        requestAccess();
      }
    })();
  </script>
</body>
</html>
