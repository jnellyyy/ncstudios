[build]
  publish = "docs"
  command = ""

[[redirects]]
  from = "/me1"
  to = "/index.html?me=1"
  status = 302
  force = true

[[redirects]]
  from = "/me1/"
  to = "/index.html?me=1"
  status = 302
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
